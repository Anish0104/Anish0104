<svg width="600" height="320" viewBox="0 0 600 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c1a2e"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="card">
      <rect width="600" height="320" rx="24"/>
    </clipPath>
  </defs>

  <rect width="600" height="320" rx="24" fill="url(#bg)"/>
  <rect x="1" y="1" width="598" height="318" rx="24" fill="none" stroke="url(#accent)" stroke-opacity="0.3" stroke-width="1.5"/>

  <!-- Glow orb -->
  <circle cx="510" cy="70" r="80" fill="#22c55e" opacity="0.10" filter="url(#glow)">
    <animate attributeName="r" values="80;105;80" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.10;0.20;0.10" dur="6s" repeatCount="indefinite"/>
  </circle>

  <!-- Shimmer -->
  <g clip-path="url(#card)">
    <rect width="300" height="320" fill="white" fill-opacity="0.03">
      <animateTransform attributeName="transform" type="translate" values="-300,0;900,0" dur="3.2s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Animated speed line (decorative) -->
  <line x1="480" y1="140" x2="560" y2="140" stroke="#38bdf8" stroke-opacity="0.4" stroke-width="1.5" stroke-linecap="round">
    <animate attributeName="x1" values="480;440;480" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0;0.4" dur="1.5s" repeatCount="indefinite"/>
  </line>
  <line x1="490" y1="155" x2="555" y2="155" stroke="#38bdf8" stroke-opacity="0.25" stroke-width="1" stroke-linecap="round">
    <animate attributeName="x1" values="490;450;490" dur="1.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.25;0;0.25" dur="1.8s" repeatCount="indefinite"/>
  </line>

  <!-- Tag -->
  <rect x="40" y="40" width="140" height="28" rx="14" fill="#38bdf8" fill-opacity="0.15" stroke="#38bdf8" stroke-opacity="0.4" stroke-width="1"/>
  <text x="56" y="58" fill="#38bdf8" font-size="12" font-family="Inter, Arial, sans-serif" font-weight="700">Computer Vision</text>

  <!-- Title -->
  <text x="40" y="122" fill="white" font-size="36" font-family="Inter, Arial, sans-serif" font-weight="800">VTrack</text>

  <!-- Description -->
  <text x="40" y="162" fill="#94a3b8" font-size="15" font-family="Inter, Arial, sans-serif">Real-time multi-vehicle detection,</text>
  <text x="40" y="184" fill="#94a3b8" font-size="15" font-family="Inter, Arial, sans-serif">tracking &amp; speed estimation on live video</text>

  <!-- Divider -->
  <line x1="40" y1="210" x2="560" y2="210" stroke="white" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Tech badges -->
  <rect x="40" y="232" width="80" height="28" rx="14" fill="white" fill-opacity="0.07" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <text x="56" y="250" fill="#e2e8f0" font-size="12" font-family="Inter, Arial, sans-serif" font-weight="600">YOLOv8</text>

  <rect x="130" y="232" width="92" height="28" rx="14" fill="white" fill-opacity="0.07" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <text x="146" y="250" fill="#e2e8f0" font-size="12" font-family="Inter, Arial, sans-serif" font-weight="600">ByteTrack</text>

  <rect x="232" y="232" width="76" height="28" rx="14" fill="white" fill-opacity="0.07" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <text x="248" y="250" fill="#e2e8f0" font-size="12" font-family="Inter, Arial, sans-serif" font-weight="600">OpenCV</text>

  <rect x="318" y="232" width="72" height="28" rx="14" fill="white" fill-opacity="0.07" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <text x="334" y="250" fill="#e2e8f0" font-size="12" font-family="Inter, Arial, sans-serif" font-weight="600">FastAPI</text>

  <!-- Metric -->
  <text x="40" y="296" fill="#22c55e" font-size="13" font-family="Inter, Arial, sans-serif" font-weight="600">Multi-class tracking · Speed estimation · Live inference</text>
</svg>
