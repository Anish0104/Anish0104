<svg width="600" height="320" viewBox="0 0 600 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#0f1f14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="card">
      <rect width="600" height="320" rx="24"/>
    </clipPath>
  </defs>

  <rect width="600" height="320" rx="24" fill="url(#bg)"/>
  <rect x="1" y="1" width="598" height="318" rx="24" fill="none" stroke="url(#accent)" stroke-opacity="0.3" stroke-width="1.5"/>

  <!-- Glow orb -->
  <circle cx="510" cy="65" r="85" fill="#4ade80" opacity="0.10" filter="url(#glow)">
    <animate attributeName="r" values="85;110;85" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.10;0.18;0.10" dur="6s" repeatCount="indefinite"/>
  </circle>

  <!-- Shimmer -->
  <g clip-path="url(#card)">
    <rect width="300" height="320" fill="white" fill-opacity="0.03">
      <animateTransform attributeName="transform" type="translate" values="-300,0;900,0" dur="3.1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Pulsing circle around emoji -->
  <circle cx="527" cy="75" r="42" fill="#4ade80" fill-opacity="0.08" stroke="#4ade80" stroke-opacity="0.2" stroke-width="1">
    <animate attributeName="r" values="42;50;42" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.2;0;0.2" dur="3s" repeatCount="indefinite"/>
  </circle>
  <text x="510" y="92" font-size="32" font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif">🌦️</text>

  <!-- Tag -->
  <rect x="40" y="40" width="96" height="28" rx="14" fill="#4ade80" fill-opacity="0.15" stroke="#4ade80" stroke-opacity="0.4" stroke-width="1"/>
  <text x="56" y="58" fill="#4ade80" font-size="12" font-family="Inter, Arial, sans-serif" font-weight="700">ML + IoT</text>

  <!-- Title -->
  <text x="40" y="122" fill="white" font-size="36" font-family="Inter, Arial, sans-serif" font-weight="800">Weather AI</text>

  <!-- Description -->
  <text x="40" y="162" fill="#94a3b8" font-size="15" font-family="Inter, Arial, sans-serif">Attention-LSTM forecasting system</text>
  <text x="40" y="184" fill="#94a3b8" font-size="15" font-family="Inter, Arial, sans-serif">built for the Indian Meteorological Dept.</text>

  <!-- Divider -->
  <line x1="40" y1="210" x2="560" y2="210" stroke="white" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Tech badges -->
  <rect x="40" y="232" width="58" height="28" rx="14" fill="white" fill-opacity="0.07" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <text x="56" y="250" fill="#e2e8f0" font-size="12" font-family="Inter, Arial, sans-serif" font-weight="600">LSTM</text>

  <rect x="108" y="232" width="50" height="28" rx="14" fill="white" fill-opacity="0.07" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <text x="124" y="250" fill="#e2e8f0" font-size="12" font-family="Inter, Arial, sans-serif" font-weight="600">AWS</text>

  <rect x="168" y="232" width="78" height="28" rx="14" fill="white" fill-opacity="0.07" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <text x="184" y="250" fill="#e2e8f0" font-size="12" font-family="Inter, Arial, sans-serif" font-weight="600">Firebase</text>

  <!-- Metric -->
  <text x="40" y="296" fill="#4ade80" font-size="13" font-family="Inter, Arial, sans-serif" font-weight="600">Govt. Copyright · IP India No. LD-20250175526</text>
</svg>
