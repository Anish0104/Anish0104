<svg width="1200" height="230" viewBox="0 0 1200 230" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>

    <!-- Text gradient -->
    <linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#38bdf8"/>
      <stop offset="40%"  stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-15%" y="-40%" width="130%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Soft glow for orbs -->
    <filter id="orb" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>

    <!-- Wave distortion on the title text -->
    <filter id="wave" x="-5%" y="-40%" width="110%" height="180%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018 0.07" numOctaves="2" seed="5" result="n">
        <animate attributeName="baseFrequency"
          values="0.018 0.07;0.024 0.09;0.018 0.07"
          dur="5s" repeatCount="indefinite"/>
      </feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="11"
        xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="230" fill="url(#bg)"/>

  <!-- Ambient orbs -->
  <circle cx="200"  cy="80"  r="90" fill="#6d28d9" opacity="0.18" filter="url(#orb)">
    <animate attributeName="r" values="90;115;90" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1000" cy="150" r="80" fill="#06b6d4" opacity="0.16" filter="url(#orb)">
    <animate attributeName="r" values="80;105;80" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600"  cy="30"  r="60" fill="#a78bfa" opacity="0.10" filter="url(#orb)">
    <animate attributeName="r" values="60;80;60" dur="5s" repeatCount="indefinite"/>
  </circle>

  <!-- Star particles -->
  <circle cx="120"  cy="30"  r="1.5" fill="white" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.05;0.5" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="350"  cy="190" r="1.5" fill="#38bdf8" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="860"  cy="50"  r="2"   fill="#a78bfa" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.05;0.5" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1100" cy="200" r="1.5" fill="#f472b6" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.05;0.4" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="480"  cy="210" r="1.5" fill="white"   opacity="0.35">
    <animate attributeName="opacity" values="0.35;0.05;0.35" dur="5s" repeatCount="indefinite"/>
  </circle>

  <!-- Shadow/depth text (offset) -->
  <text x="604" y="138"
    text-anchor="middle"
    font-size="76"
    font-weight="900"
    font-family="Impact, Arial Black, Haettenschweiler, sans-serif"
    fill="#1e1b4b"
    filter="url(#wave)">
    Welcome to Anish's GitHub!
  </text>

  <!-- Main wavy title -->
  <text x="600" y="134"
    text-anchor="middle"
    font-size="76"
    font-weight="900"
    font-family="Impact, Arial Black, Haettenschweiler, sans-serif"
    fill="url(#tg)"
    filter="url(#wave)">
    Welcome to Anish's GitHub!
  </text>

  <!-- Glow layer -->
  <text x="600" y="134"
    text-anchor="middle"
    font-size="76"
    font-weight="900"
    font-family="Impact, Arial Black, Haettenschweiler, sans-serif"
    fill="url(#tg)"
    filter="url(#glow)"
    opacity="0.45">
    Welcome to Anish's GitHub!
  </text>

  <!-- Subtitle fade-in -->
  <text x="600" y="185"
    text-anchor="middle"
    font-size="18"
    font-family="Arial, sans-serif"
    font-weight="400"
    fill="#94a3b8"
    opacity="0">
    AI / ML Engineer · MS CS @ Rutgers · Building production-grade AI systems
    <animate attributeName="opacity" from="0" to="1" dur="1s" begin="0.5s" fill="freeze"/>
  </text>
</svg>
