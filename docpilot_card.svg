<svg width="600" height="320" viewBox="0 0 600 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#0c2233"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="card">
      <rect width="600" height="320" rx="24"/>
    </clipPath>
  </defs>

  <rect width="600" height="320" rx="24" fill="url(#bg)"/>
  <rect x="1" y="1" width="598" height="318" rx="24" fill="none" stroke="url(#accent)" stroke-opacity="0.3" stroke-width="1.5"/>

  <!-- Glow orb -->
  <circle cx="520" cy="60" r="90" fill="#06b6d4" opacity="0.10" filter="url(#glow)">
    <animate attributeName="r" values="90;115;90" dur="5.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.10;0.18;0.10" dur="5.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Shimmer -->
  <g clip-path="url(#card)">
    <rect width="300" height="320" fill="white" fill-opacity="0.03">
      <animateTransform attributeName="transform" type="translate" values="-300,0;900,0" dur="2.8s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Animated dot (typing indicator) -->
  <circle cx="530" cy="150" r="4" fill="#22d3ee" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.1;0.8" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="548" cy="150" r="4" fill="#22d3ee" opacity="0.8">
    <animate attributeName="opacity" values="0.1;0.8;0.1" dur="1.2s" begin="0.4s" repeatCount="indefinite"/>
  </circle>

  <!-- Tag -->
  <rect x="40" y="40" width="100" height="28" rx="14" fill="#22d3ee" fill-opacity="0.15" stroke="#22d3ee" stroke-opacity="0.4" stroke-width="1"/>
  <text x="56" y="58" fill="#22d3ee" font-size="12" font-family="Inter, Arial, sans-serif" font-weight="700">RAG System</text>

  <!-- Title -->
  <text x="40" y="122" fill="white" font-size="36" font-family="Inter, Arial, sans-serif" font-weight="800">DocPilot</text>

  <!-- Description -->
  <text x="40" y="162" fill="#94a3b8" font-size="15" font-family="Inter, Arial, sans-serif">RAG pipeline for document Q&amp;A —</text>
  <text x="40" y="184" fill="#94a3b8" font-size="15" font-family="Inter, Arial, sans-serif">query your PDFs with LLaMA 3.1</text>

  <!-- Divider -->
  <line x1="40" y1="210" x2="560" y2="210" stroke="white" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Tech badges -->
  <rect x="40" y="232" width="86" height="28" rx="14" fill="white" fill-opacity="0.07" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <text x="56" y="250" fill="#e2e8f0" font-size="12" font-family="Inter, Arial, sans-serif" font-weight="600">LLaMA 3.1</text>

  <rect x="136" y="232" width="90" height="28" rx="14" fill="white" fill-opacity="0.07" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <text x="152" y="250" fill="#e2e8f0" font-size="12" font-family="Inter, Arial, sans-serif" font-weight="600">ChromaDB</text>

  <rect x="236" y="232" width="84" height="28" rx="14" fill="white" fill-opacity="0.07" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <text x="252" y="250" fill="#e2e8f0" font-size="12" font-family="Inter, Arial, sans-serif" font-weight="600">Streamlit</text>

  <!-- Metric -->
  <text x="40" y="296" fill="#22d3ee" font-size="13" font-family="Inter, Arial, sans-serif" font-weight="600">Semantic chunking · Vector retrieval · Cited answers</text>
</svg>
