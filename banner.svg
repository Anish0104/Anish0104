<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="45%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="roundRect">
      <rect width="1200" height="300" rx="30"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" rx="30" fill="url(#grad)"/>

  <!-- Ambient glow orbs -->
  <circle cx="950" cy="80" r="120" fill="#6d28d9" opacity="0.18" filter="url(#softglow)">
    <animate attributeName="r" values="120;140;120" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.18;0.28;0.18" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1100" cy="220" r="80" fill="#06b6d4" opacity="0.14" filter="url(#softglow)">
    <animate attributeName="r" values="80;100;80" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.14;0.22;0.14" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="240" r="60" fill="#a78bfa" opacity="0.10" filter="url(#softglow)">
    <animate attributeName="r" values="60;80;60" dur="7s" repeatCount="indefinite"/>
  </circle>

  <!-- Floating particles -->
  <circle cx="820" cy="50" r="2.5" fill="#a78bfa" opacity="0.7">
    <animate attributeName="cy" values="50;30;50" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="950" cy="160" r="2" fill="#38bdf8" opacity="0.6">
    <animate attributeName="cy" values="160;140;160" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.15;0.6" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1050" cy="100" r="3" fill="#c4b5fd" opacity="0.5">
    <animate attributeName="cy" values="100;75;100" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="750" cy="200" r="2" fill="#67e8f9" opacity="0.5">
    <animate attributeName="cy" values="200;180;200" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="880" cy="250" r="1.5" fill="#a78bfa" opacity="0.6">
    <animate attributeName="cy" values="250;230;250" dur="4.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Shimmer sweep (clipped to rounded rect) -->
  <g clip-path="url(#roundRect)">
    <rect width="600" height="300" fill="url(#shimmer)" opacity="1">
      <animateTransform attributeName="transform" type="translate" values="-600,0;1800,0" dur="3.5s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Name with gradient fill -->
  <text x="80" y="118" font-size="44" font-family="Inter, Segoe UI, Arial" font-weight="800" fill="url(#textGrad)" filter="url(#glow)">
    Anish Shirodkar
    <animate attributeName="opacity" values="0;1" dur="0.8s" fill="freeze"/>
  </text>

  <!-- Subtitle -->
  <text x="80" y="162" fill="#e2e8f0" font-size="18" font-family="Inter, Segoe UI, Arial" font-weight="500" opacity="0">
    AI · ML · Computer Vision · RAG · LLM Systems
    <animate attributeName="opacity" values="0;1" dur="0.8s" begin="0.3s" fill="freeze"/>
  </text>

  <!-- Description -->
  <text x="80" y="198" fill="#94a3b8" font-size="15" font-family="Inter, Segoe UI, Arial" opacity="0">
    Building production-ready AI systems from model to product
    <animate attributeName="opacity" values="0;1" dur="0.8s" begin="0.5s" fill="freeze"/>
  </text>

  <!-- Pills -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.8s" begin="0.7s" fill="freeze"/>

    <rect x="80" y="228" width="158" height="36" rx="18" fill="white" fill-opacity="0.10" stroke="#a78bfa" stroke-opacity="0.5" stroke-width="1"/>
    <text x="100" y="251" fill="white" font-size="13" font-family="Inter, Segoe UI, Arial" font-weight="600">MS CS @ Rutgers</text>

    <rect x="248" y="228" width="192" height="36" rx="18" fill="white" fill-opacity="0.10" stroke="#38bdf8" stroke-opacity="0.5" stroke-width="1"/>
    <text x="268" y="251" fill="white" font-size="13" font-family="Inter, Segoe UI, Arial" font-weight="600">Open to Internships 🚀</text>

    <rect x="450" y="228" width="220" height="36" rx="18" fill="white" fill-opacity="0.10" stroke="#c4b5fd" stroke-opacity="0.5" stroke-width="1"/>
    <text x="470" y="251" fill="white" font-size="13" font-family="Inter, Segoe UI, Arial" font-weight="600">AI · Full-Stack Systems</text>
  </g>

  <!-- Subtle grid lines (decorative) -->
  <line x1="700" y1="0" x2="700" y2="300" stroke="white" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="900" y1="0" x2="900" y2="300" stroke="white" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="1100" y1="0" x2="1100" y2="300" stroke="white" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="700" y1="100" x2="1200" y2="100" stroke="white" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="700" y1="200" x2="1200" y2="200" stroke="white" stroke-opacity="0.03" stroke-width="1"/>
</svg>
